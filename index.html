<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>MindScaping</title>
  </head>
  <body>
    <div class="box tablet">
      <div class="box column wide tablet-full mobile-fit">
        <div class="box upper mobile-stack mobile-fit">
          <div class="box column side mobile-full">
            <div class="box card column double">
              <p>Проектное<br>обучение</p>
              <img src="pictures/project.jpg">
            </div>
            <div class="box card column single">
              <p>Практика<br>превыше всего</p>
            </div>
          </div>
          <div class="box column main mobile-full">
            <div class="box">
              <div class="box card column">
                <p>Нет лекций,<br>домашек</p>
                <img src="pictures/life.jpg">
              </div>
              <div class="box card column gradient">
                <p>Группы из 8<br>человек</p>
                <img src="pictures/team.jpg">
              </div>
            </div>
            <div class="box card column hero">
              <img src="pictures/Frame 34327 (4).png" class="logo">
            </div>
          </div>
        </div>

        <div class="box lower">
          <div class="box card main gradient">
            <p>Выбери место<br>в мастерской</p>
            <img src="pictures/robot.jpg">
          </div>
          <div class="box card side">
            <p class="result">Результат —<br>работающий продукт</p>
            <img src="pictures/business.jpg">
          </div>
        </div>
      </div>
      <div class="box column narrow tablet-full">
        <div class="box card column">
          <p class="architecture">Архитектурная<br>мастерская</p>
          <img src="pictures/architecture.jpg" class="contain">
        </div>
        <div class="box card column gradient">
          <p class="create">Создаем<br>реальные проекты</p>
          <img src="pictures/real_projects.jpg">
        </div>
      </div>
    </div>
  </body>
</html>
