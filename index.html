<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>MS Workshop</title>
  </head>
  <body>
    <div class="box tablet">
      <div class="box column wide tablet-full mobile-fit">
        
        <div class="box upper mobile-stack mobile-fit">
          <div class="box column side mobile-full">
            <div class="box card column double">
              <p>Проектное<br>обучение</p>
              <img src="pic/Frame 7 (1).png">
            </div>
            <div class="box card column single">
              <p>Практика<br>превыше всего</p>
            </div>
          </div>
          <div class="box column main mobile-full">
            <div class="box">
              <div class="box card column">
                <p>Нет лекций,<br>домашек</p>
                <img src="pic/Frame 34327.png">
              </div>
              <div class="box card column gradient">
                <p>Группы из 8<br>человек</p>
                <img src="pic/Frame 123124.png">
              </div>
            </div>
            <div class="box card column hero">
              <img src="pic/Frame 34327 (4).png" class="logo">
            </div>
          </div>
        </div>

        <div class="box lower">
          <div class="box card main gradient">
            <p>Выбери место<br>в мастерской</p>
            <img src="pic/Frame 34327 (3).png">
          </div>
          <div class="box card side">
            <p>Результат —<br>работающий продукт</p>
            <img src="pic/Frame 34327 (2).png">
          </div>
        </div>
      </div>

      <div class="box column narrow tablet-full">
        <div class="box card column">
          <p>Архитектурная<br>мастерская</p>
          <img src="pic/Frame 34327 (1).png" class="contain">
        </div>
        <div class="box card column gradient">
          <p>Создаем<br>реальные проекты</p>
          <img src="pic/Frame 123128.png">
        </div>
      </div>
    </div>
  </body>
</html>
